<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <title>피하기 게임 - 중독성 있는 장애물 피하기 미니게임</title>
    <meta name="description" content="장애물을 피하고 코인을 모아 최고 기록을 경신하세요! 쉽고 중독성 있는 무료 웹 게임입니다. 지금 바로 플레이해보세요!" />
    <meta name="keywords" content="게임, 미니게임, 피하기게임, 무료게임, 중독성게임, 웹게임" />
    <meta name="google-site-verification" content="oHdQWMt1LTE2PQKHOl65AJvGQL-NjbxNcliAVdulcLc" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { console.warn('Blocked fetch override'); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Fetch protector failed:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
